services:
  # ============================================
  # API Server — FastAPI + LangGraph (full container)
  # ============================================
  # File này KHÔNG còn nằm trong đường deploy chính (deploy_Plan.html chọn
  # Google Cloud Run, build trực tiếp từ Dockerfile qua Cloud Build, không
  # qua docker-compose) — chỉ giữ làm phương án self-host dự phòng trên VM
  # (Oracle/Hetzner, xem deploy_Plan.html §9). Dockerfile không còn cài
  # MinerU/torch (optimize_Plan.html §4) và vector store/checkpointer đã
  # migrate sang Supabase pgvector/Postgres (§3) — container này hoàn toàn
  # stateless, volume `app-data` chỉ còn giữ PDF Agent output + LaTeX export.
  # Cho local dev, chỉ MinerU (optional) sống trong Docker — dùng
  # `docker-compose.dev.yml` thay vì file này.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lit-surveyor-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agent-network
    deploy:
      resources:
        # Hạ lại từ 4G/2.0 cpu (mức cũ khi MinerU còn baked vào image — PP-DocLayout +
        # UniMERNet + PaddleOCR load nhiều model vào RAM khi parse PDF). Image giờ chỉ
        # còn PyMuPDF (nhẹ) — 1.5G đủ cho FastAPI + LangGraph + nhiều LLM call song song
        # (Step ⑥/⑧ research agent), còn dư margin nếu host VM (Oracle/Hetzner) thực ra
        # có nhiều RAM hơn mức limits này.
        limits:
          memory: 1.5G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped

# ============================================
# Named Volumes — Data persistence
# ============================================
volumes:
  app-data:
    driver: local

# ============================================
# Network — Cách ly các dịch vụ
# ============================================
networks:
  agent-network:
    driver: bridge
