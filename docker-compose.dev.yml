# Local dev: backend chạy NATIVE (anaconda env, `uvicorn backend.main:app --reload`),
# chỉ MinerU sống trong Docker — tránh phải cài torch/paddle/onnxruntime vào env dev.
# Vector store + LangGraph checkpointer trỏ thẳng vào Supabase (như production) —
# không còn ChromaDB container ở đây nữa (optimize_Plan.html §3 — migrated sang
# pgvector, xem supabase/schema.sql §14-16).
#
# Chạy:    docker compose -f docker-compose.dev.yml up -d
# Dừng:    docker compose -f docker-compose.dev.yml down
#
# .env cần set MINERU_MODE=http + MINERU_API_URL=http://localhost:8001 (chỉ nếu
# muốn test MinerU thật — bỏ qua thì PDF Agent tự fallback PyMuPDF) và
# SUPABASE_DB_URL trỏ vào project Supabase dev/shared — xem
# `backend/module/pdf_agent/services/mineru_client.py` / `vector_store.py`.
services:
  # MinerU API — backend native gọi qua HTTP (`run_mineru_http()`). Không cần
  # bind-mount volume — server trả content_list + ảnh figure (base64,
  # `return_images=true`) ngay trong response HTTP, nên không phụ thuộc 2
  # filesystem (host/container) phải thấy chung 1 đường dẫn (macOS Docker
  # Desktop's file-sharing permission cho `~/Desktop` không phải lúc nào cũng
  # cấp sẵn — xem PaperPulse memory về bug này).
  mineru:
    build:
      context: .
      dockerfile: Dockerfile.mineru
    container_name: paperpulse-mineru
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    restart: unless-stopped
