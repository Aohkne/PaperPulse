# Local dev: backend chạy NATIVE (anaconda env, `uvicorn backend.main:app --reload`),
# chỉ MinerU + ChromaDB sống trong Docker — tránh phải cài torch/paddle/onnxruntime
# (MinerU) hoặc deps embedded storage (ChromaDB) vào env dev.
#
# Chạy:    docker compose -f docker-compose.dev.yml up -d
# Dừng:    docker compose -f docker-compose.dev.yml down
#
# .env cần set MINERU_MODE=http + MINERU_API_URL=http://localhost:8001 và
# CHROMA_MODE=http + CHROMA_HOST=localhost + CHROMA_PORT=8002 — xem
# `backend/module/pdf_agent/services/mineru_client.py` / `vector_store.py`.
services:
  # MinerU API — backend native gọi qua HTTP (`run_mineru_http()`). Không cần
  # bind-mount volume — server trả content_list + ảnh figure (base64,
  # `return_images=true`) ngay trong response HTTP, nên không phụ thuộc 2
  # filesystem (host/container) phải thấy chung 1 đường dẫn (macOS Docker
  # Desktop's file-sharing permission cho `~/Desktop` không phải lúc nào cũng
  # cấp sẵn — xem PaperPulse memory về bug này).
  mineru:
    build:
      context: .
      dockerfile: Dockerfile.mineru
    container_name: paperpulse-mineru
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    restart: unless-stopped

  # ChromaDB — backend native gọi qua HTTP (`vector_store.py`'s HttpClient).
  # Tag pin đúng version pip package `chromadb` client đang dùng (1.5.9) —
  # tránh lệch API ngầm giữa client/server (image `:latest` từng là 1.0.0,
  # cách xa client 1.5.9).
  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: paperpulse-chromadb
    ports:
      - "8002:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma-data:
    driver: local
