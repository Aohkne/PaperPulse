name: CI — Lint → Test
# Build + deploy không còn ở đây nữa (deploy_Plan.html §6) — backend deploy
# qua Cloud Run "Continuously deploy from a repository" (Cloud Build trigger
# riêng, tạo trong GCP Console, không phải workflow này), frontend deploy
# qua Cloudflare Pages's GitHub integration. Workflow này chỉ còn gatekeeping
# code quality trước khi merge.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # Bước 1: Lint Backend (Ruff)
  # ============================================
  lint-backend:
    name: Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install "ruff>=0.8.0"

      - name: Run Ruff check
        run: ruff check . --output-format=github

      - name: Check formatting
        run: ruff format --check .

  # ============================================
  # Bước 2: Lint Frontend (ESLint via Bun)
  # ============================================
  lint-frontend:
    name: Lint Frontend (ESLint/Bun)
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run ESLint
        working-directory: frontend
        run: bun run lint

  # ============================================
  # Bước 3: Run Tests (pytest)
  # ============================================
  test:
    name: Chạy Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov httpx

      - name: Run tests with coverage
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: coverage-report
          path: coverage.xml
